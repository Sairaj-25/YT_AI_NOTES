<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My App</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style src="../static/style.css"></style>
</head>
<body>

    <div id="register-response" class="mt-2 text-danger" style="font-size: 0.9rem; text-align: center;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                
                <div class="text-center mt-md-5">
                    <h2 class="fw-bold">Create an Account</h2>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-2 p-md-5">
                        
                        <form hx-post="/api/v1/auth/register" hx-target="#register-response" hx-swap="innerHTML"  hx-indicator="#reg-spinner">
                            <div class="mb-3">
                                <label for="registerName" class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control sf-input" id="registerName" name="name" placeholder="John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label for="registerEmail" class="form-label fw-semibold">Email address</label>
                                <input type="email" class="form-control sf-input" id="registerEmail" name="email" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="registerPassword" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control sf-input" id="registerPassword" name="password" placeholder="********" required minlength="6">
                            </div>


                            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                                Create Account
                                <span class="spinner-border spinner-border-sm htmx-indicator ms-2" role="status" aria-hidden="true"></span>
                            </button>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account? <a href="/login" class="text-decoration-none fw-semibold">Log in here</a></p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.body.addEventListener('input', function(evt) {
            if (evt.target.classList.contains('sf-input')) {
                evt.target.classList.remove('error-field');
                const responseDiv = document.getElementById('register-response');
                if (responseDiv) responseDiv.innerHTML = '';
            }
        });
    </script>
</body>
</html>
