<link rel="stylesheet" href="../static/style.css">

<div id="resultCard" class="transition-all">
    <!-- Header -->
    <div class="result-header">
        <div class="result-title-group">
            <div class="result-check-icon" aria-hidden="true">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="result-title" title="{{ title }}">{{ title }}</h2>
        </div>

        <div class="header-actions">
            <button id="copyBtn"
                    class="action-btn copy-btn"
                    onclick="handleCopy(this)"
                    aria-label="Copy notes to clipboard">
                <i class="fa-regular fa-copy" aria-hidden="true"></i>
                <span id="copyText">Copy</span>
            </button>
 
            <button id="downloadBtn"
                    class="action-btn download-btn"
                    onclick="handleDownloadPDF(this)"
                    aria-label="Download notes as PDF">
                <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
                <span>PDF</span>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="result-body">
        <article id="blogContent" aria-label="Generated notes"></article>
    </div>

    <!-- Raw markdown (hidden, used for copy & rendering) -->
    <div id="rawMarkdown" class="hidden" aria-hidden="true">{{ note_content }}</div>
</div>

<!-- Clean white print area — only shown during window.print() -->
<div id="pdf-print-area" style="display:none" aria-hidden="true">
    <div class="pdf-header">
        <span class="pdf-brand">YT-AI-Blog</span>
        <span class="pdf-date" id="pdfDate"></span>
    </div>
    <div id="pdfBody"></div>
    <div class="pdf-footer">
        <span>Generated by YT-AI-Blog</span>
        <span id="pdfFooterDate"></span>
    </div>
</div>

<script src="../static/app.js"></script>
