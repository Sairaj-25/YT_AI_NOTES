<!-- ── Result Card ──────────────────────────────────────────────────── -->
<!-- NOTE: No <link> or <script> tags here — this is an HTMX partial.  -->
<!-- All scripts/styles live in index.html.                             -->

<div id="resultCard"
     class="opacity-0 translate-y-5 transition-all duration-500
            bg-[#13131f] border border-white/[0.07] rounded-2xl overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between gap-3 px-6 py-4
                bg-white/[0.03] border-b border-white/[0.07]">

        <div class="flex items-center gap-3 overflow-hidden flex-1 min-w-0">
            <!-- Check icon -->
            <div class="w-9 h-9 rounded-xl shrink-0 grid place-items-center text-[13px]
                        bg-green-500/10 border border-green-500/20 text-green-400
                        shadow-[0_0_16px_rgba(34,197,94,0.15)]"
                 aria-hidden="true">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="font-['Bricolage_Grotesque'] font-semibold text-[1rem] text-[#f0f0f6]
                       tracking-tight truncate"
                title="{{ title }}">{{ title }}</h2>
        </div>

        <div class="flex items-center gap-2 shrink-0">
            <!-- Copy button -->
            <button id="copyBtn"
                    class="flex items-center gap-2 px-4 py-2 rounded-xl text-[0.8rem]
                           font-medium text-[#8b8ba7]
                           border border-white/[0.07] bg-transparent
                           hover:bg-[#ff3b5c]/[0.08] hover:border-[#ff3b5c]/30 hover:text-[#ff3b5c]
                           transition-all duration-200 cursor-pointer"
                    onclick="handleCopy(this)"
                    aria-label="Copy notes to clipboard">
                <i class="fa-regular fa-copy" aria-hidden="true"></i>
                <span id="copyText">Copy</span>
            </button>

            <!-- PDF button -->
            <button id="downloadBtn"
                    class="flex items-center gap-2 px-4 py-2 rounded-xl text-[0.8rem]
                           font-medium text-[#8b8ba7]
                           border border-white/[0.07] bg-transparent
                           hover:bg-[#ff3b5c]/[0.08] hover:border-[#ff3b5c]/30 hover:text-[#ff3b5c]
                           transition-all duration-200 cursor-pointer"
                    onclick="handleDownloadPDF(this)"
                    aria-label="Download notes as PDF">
                <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
                <span>PDF</span>
            </button>
        </div>
    </div>

    <!-- Content area where marked.js renders the markdown -->
    <div class="p-8 sm:p-5">
        <article id="blogContent"
                 class="prose-content text-[#8b8ba7] text-[0.95rem] leading-[1.8]"
                 aria-label="Generated notes"></article>
    </div>

    <!-- Raw markdown injected as JSON to avoid Jinja2 HTML-escaping issues -->
    <script id="rawMarkdownData" type="application/json">{{ note_content | tojson }}</script>
    <div id="rawMarkdown" class="hidden" aria-hidden="true"></div>
</div>

<!-- Print-only PDF area -->
<div id="pdf-print-area" style="display:none" aria-hidden="true">
    <div class="pdf-header">
        <span class="pdf-brand">YT-AI-Note</span>
        <span class="pdf-date" id="pdfDate"></span>
    </div>
    <div id="pdfBody"></div>
    <div class="pdf-footer">
        <span>Generated by YT-AI-Note</span>
        <span id="pdfFooterDate"></span>
    </div>
</div>
