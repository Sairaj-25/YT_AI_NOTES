<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style src="../static/style.css"></style>
</head>
<body>

    <div id="login-response" class="mt-2 text-danger" style="font-size: 0.9rem; text-align: center;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                
                <div class="text-center mt-md-5">
                    <h2 class="fw-bold">Login</h2>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-2 p-md-5">
                        
                        <form 
                            hx-post="/api/v1/auth/login" 
                            hx-target="#login-response" 
                            hx-swap="innerHTML"  
                            hx-indicator="#login-spinner">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username / Email</label>
                                <input type="email" class="form-control sf-input" id="username" name="username" placeholder="Enter your username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control sf-input" id="password" name="password" placeholder="********" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                                Sign In
                                <span class="spinner-border spinner-border-sm htmx-indicator ms-2" role="status" aria-hidden="true"></span>
                            </button>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="/register" class="text-decoration-none fw-semibold">Register here</a></p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
