<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — YT-AI-NOTE</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body style="height:100vh;overflow:hidden">

    <div class="bg-mesh" aria-hidden="true"></div>

    <nav aria-label="Main navigation">
        <div class="nav-inner">
            <a href="/" class="logo" aria-label="YT-AI-Blog home">
                <div class="logo-icon" aria-hidden="true"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <span class="logo-text">YT<span>-AI-</span>NOTE</span>
            </a>
            <a href="/register" class="btn-nav-ghost">Signup</a>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-wrapper">
            <div class="auth-card" role="region" aria-label="Login form">

                <div class="auth-header">
                    <h1 class="auth-title">Signin</h1>
                </div>

                <div id="login-response" class="auth-error" role="alert" aria-live="polite"></div>

                <form class="auth-form" hx-post="/api/v1/auth/login" hx-target="#login-response" hx-swap="innerHTML" hx-indicator="#login-spinner">

                    <div class="auth-social-row">
                        <button type="button" class="btn-social"><i class="fa-brands fa-google"></i> Google</button>
                        <button type="button" class="btn-social"><i class="fa-brands fa-github"></i> GitHub</button>
                    </div>

                    <div class="auth-divider"><span>or continue with email</span></div>

                    <div class="auth-field">
                        <label for="username" class="auth-label">Email</label>
                        <input type="email" class="auth-input" id="username" name="username" placeholder="you@example.com" required autocomplete="username" spellcheck="false">
                    </div>

                    <div class="auth-field">
                        <label for="password" class="auth-label">Password</label>
                        <div class="auth-input-wrap">
                            <input type="password" class="auth-input" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="auth-toggle-pw" data-target="password" aria-label="Toggle password"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    </div>

                    <div class="auth-meta">
                        <label class="auth-checkbox"><input type="checkbox" name="remember"><span>Remember me</span></label>
                        <a href="/forgot-password" class="auth-forgot">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-auth-primary">
                        <span class="btn-auth-text">Sign In</span>
                        <i class="fa-solid fa-spinner fa-spin htmx-indicator" id="login-spinner" aria-hidden="true"></i>
                    </button>
                </form>

                <div class="auth-footer">
                    <span class="auth-footer-text">Don't have an account?</span>
                    <a href="/register" class="auth-footer-link">Create one here</a>
                </div>

            </div>
        </div>
    </main>

    <footer class="auth-footer-bar"><p>&copy; 2026 YT-AI-Blog. All rights reserved.</p></footer>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        document.body.addEventListener('input', function(e) {
            if (e.target.classList.contains('auth-input')) {
                e.target.classList.remove('error-field');
                var el = document.getElementById('login-response');
                if (el) el.innerHTML = '';
            }
        });
        document.querySelectorAll('.auth-toggle-pw').forEach(function(b) {
            b.addEventListener('click', function() {
                var t = document.getElementById(this.dataset.target), i = this.querySelector('i');
                t.type = t.type === 'password' ? 'text' : 'password';
                i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
            });
        });
    </script>
</body>
</html>
